<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Instituto patria</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* CONTENEDOR DEL BANNER */
.banner {
    height: 1000px;
    background-image: url("../mi proyecto/imagenes/principal.jpeg");
    background-size: cover;
    background-position: center;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CONTENIDO */
.contenido {
    position: relative;
    text-align: center;
    color: white;
    animation: aparecer 2s ease;
}

/* TÍTULO */
.contenido h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

/* TEXTO */
.contenido p {
    font-size: 18px;
    margin-bottom: 20px;
}

/* BOTÓN */
.boton {
    background: #00bcd4;
    color: white;
    padding: 12px 25px;
    text-decoration: none;
    border-radius: 5px;
    transition: 0.3s;
}

.boton:hover {
    background: #0097a7;
}

/* ANIMACIÓN */
@keyframes aparecer {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

</head>

<body>

<div class="banner">
    <div class="contenido">
       <img src="imagenes/colegio.jpg" width="150"><h1>Instituto Patria La Lima</h1>
        <p>Bienvenido a la pagina del instituto que aqui puede encontrar toda la informacion sobre el instituto y sobre las carreras.<br>Tambien para tranformar personas profesionales para un buen futuro para hijo(a).</p>
        <a href="inicio.html" class="boton">inicio</a>
    </div>
</div>

</body>
</html>
